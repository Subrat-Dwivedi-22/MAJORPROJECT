version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo-container
    networks:
      - app-network

  app:
    image: my-node-app
    container_name: node-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - app-network

networks:
  app-network: